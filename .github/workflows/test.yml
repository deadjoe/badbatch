name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (Linux stable)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust (stable)
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy, llvm-tools-preview

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Install testing tools
      run: |
        cargo install cargo-llvm-cov cargo-audit cargo-deny --locked || cargo install cargo-llvm-cov cargo-audit cargo-deny

    - name: Make test script executable
      run: chmod +x scripts/test-all.sh

    - name: Run test suite
      env:
        BB_CI: "1"
      run: ./scripts/test-all.sh

    - name: Core-only library tests (no default features)
      run: cargo test --lib --no-default-features --locked

  miri:
    name: Miri (nightly)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust (nightly + miri)
      uses: dtolnay/rust-toolchain@nightly
      with:
        components: miri

    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-miri-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-miri-

    - name: Setup Miri
      run: cargo miri setup

    - name: Miri — ring buffer / sequence safety subset
      # Full concurrent suites are too slow/noisy under Miri; focus on the
      # aliasing-critical ring buffer and sequence primitives that use unsafe.
      # Precise module filters avoid pulling in proptest (needs cwd under isolation).
      env:
        MIRIFLAGS: -Zmiri-strict-provenance
      run: |
        cargo miri test --lib disruptor::ring_buffer::tests
        cargo miri test --lib disruptor::sequence::tests -- --skip thread_safety
